services:
  frontend:
    build: front_end
    ports:
      - "3000:3000"
    depends_on:
      - app
  app:
    build: app
    ports:
      - "8000:8000"
    depends_on:
      - db
  db:
    image: mongo
    volumes:
      - mongo-data:/data/db
#    environment:
#      MONGO_INITDB_ROOT_USERNAME: admin
#      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
volumes:
  mongo-data: